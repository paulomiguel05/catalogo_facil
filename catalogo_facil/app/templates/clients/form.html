{% extends 'base.html' %}

{% block title %}
    {% if client %}Editar Cliente{% else %}Novo Cliente{% endif %}
{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>{% if client %}Editar Cliente{% else %}Novo Cliente{% endif %}</h1>
        <p>Preencha os dados do cliente.</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST" class="form-grid">
        <div class="form-group full">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" value="{{ client.nome if client else '' }}" required>
        </div>

        <div class="form-group">
            <label for="numero">Telefone / Celular</label>
            <input
                type="text"
                id="numero"
                name="numero"
                class="form-control"
                maxlength="20"
                value="{{ client.numero[2:] if client and client.numero and client.numero.startswith('55') else (client.numero if client else '') }}"
                placeholder="Ex: (11) 91234-5678"
                required
            >
        </div>

        <div class="form-group">
            <label for="cpf">CPF</label>
            <input
                type="text"
                id="cpf"
                name="cpf"
                value="{{ client.cpf if client and client.cpf else '' }}"
                placeholder="Digite o CPF do cliente"
                maxlength="14"
            >
        </div>

        <div class="form-group full">
            <label for="endereco">Endereço</label>
            <input
                type="text"
                id="endereco"
                name="endereco"
                value="{{ client.endereco if client else '' }}"
                placeholder="Digite o endereço do cliente"
            >
        </div>

        <div class="form-actions full">
            <a href="{{ url_for('clients.list_clients') }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Salvar cliente</button>
        </div>
    </form>
</div>
<script>
const cpfInput = document.getElementById('cpf');

function aplicarMascaraCPF(valor) {
    valor = valor.replace(/\D/g, '');
    valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
    valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
    valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
    return valor;
}

cpfInput.addEventListener('input', function () {
    this.value = aplicarMascaraCPF(this.value);
});

window.addEventListener('load', function () {
    cpfInput.value = aplicarMascaraCPF(cpfInput.value);
});

document.addEventListener('DOMContentLoaded', function () {
    const numeroInput = document.getElementById('numero');

    if (!numeroInput) return;

    numeroInput.addEventListener('input', function () {
        let valor = numeroInput.value.replace(/\D/g, '').slice(0, 11);

        if (valor.length > 2) {
            valor = `(${valor.slice(0, 2)}) ${valor.slice(2)}`;
        }

        if (valor.length > 10) {
            valor = `${valor.slice(0, 10)}-${valor.slice(10)}`;
        }

        numeroInput.value = valor;
    });
});
</script>
{% endblock %}
